version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gym_app_db
    restart: always
    environment:
      MYSQL_DATABASE: gym_app
      MYSQL_USER: gym_user
      MYSQL_PASSWORD: secure_gym_password
      MYSQL_ROOT_PASSWORD: root_gym_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"

  api:
    build:
      context: ./api
    container_name: gym_app_api
    restart: always
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_NAME=gym_app
      - DB_USER=gym_user
      - DB_PASS=secure_gym_password
    depends_on:
      - db

volumes:
  db_data:
